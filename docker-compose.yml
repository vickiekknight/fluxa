# ============================================================
# Fluxa docker-compose.yml
# Usage:
#   docker compose build        # first time
#   docker compose up -d        # start
#   docker compose exec fluxa bash   # shell into container
#   docker compose down         # stop
# ============================================================

services:
  fluxa:
    build:
      context: .
      dockerfile: Dockerfile
    image: fluxa-isaacsim:latest
    container_name: fluxa-isaacsim-container
    
    # ── Force container to stay open in headless mode ───────
    tty: true
    stdin_open: true
    command: tail -f /dev/null

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility, graphics]
              
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ACCEPT_EULA=Y
      - PRIVACY_CONSENT=Y
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DISPLAY=
      - OMNI_KIT_ALLOW_ROOT=1
      
    volumes:
      # Live-mount agent pack so edits don't require rebuild
      - .:/isaac-sim/fluxa-agent-pack
      
    # Directly uses host network stack
    network_mode: host