# ============================================================
# Fluxa docker-compose.yml
# Usage:
#   docker compose build        # first time (takes ~30 min)
#   docker compose up -d        # start
#   docker compose exec fluxa bash   # shell into container
#   docker compose down         # stop
# ============================================================

services:
  fluxa:
    build:
      context: .
      dockerfile: Dockerfile
    image: fluxa-isaacsim:latest
    container_name: fluxa-isaacsim-container
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility, graphics]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ACCEPT_EULA=Y
      - PRIVACY_CONSENT=Y
      # Copy .env and add your API keys:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      # Live-mount agent pack so edits don't require rebuild
      - .:/isaac-sim/fluxa-agent-pack
    network_mode: host
    ports:
      - "8765:8765"       # Fluxa WebSocket agent server
      - "47998:47998/udp" # Isaac Sim streaming
      - "49100:49100"     # Isaac Sim API
    stdin_open: true
    tty: true