# --- Docker / Subprocess Config ---
# These paths are as seen from INSIDE the Docker container
docker:
  container: "fluxa-isaacsim"
  python: "/isaac-sim/python.sh"
  shared_dir: "/isaac-sim/fluxa-agent-pack/.agent/skills/reward-designer"
  eval_script: "/isaac-sim/fluxa-agent-pack/.agent/skills/reward-designer/scripts/eval_headless.py"

# --- Isaac Sim (only used for streaming mode, not optimization) ---
isaac_sim:
  host: localhost
  port: 8765
  results_port: 8766
  host_ip: "10.0.0.1"

# --- Stage 1 Configuration ---
eureka:
  iterations: 16
  model: "gemini-2.5-flash-lite"
  eval_num_envs: 256
  train_iterations: 300
  final_train_iterations: 1000

# --- Task Description ---
task_description: >
  The robot must move its end-effector to the target 3D pose specified in the command.
  The motion should be smooth, avoiding sudden jerks (action rate penalty).
  Success is defined as the end-effector staying within 5cm of the target position
  with the correct orientation.

task_name: franka-reach

# --- Paths (relative to designer_root) ---
designer_root: "."
reward_signature_file: "./prompts/reward_signature_reach.txt"
reward_template_file: "./templates/reward_template.py"
reward_output_file: "./outputs/reward_fn.py"
rapp_bounds_file: "./outputs/rapp_bounds.json"

# --- Stage 2: RAPP ---
rapp:
  num_envs: 256
  eval_steps: 300
  success_threshold: 0.10
  target_metric: "position_error"
  parameter_test_vals:
    joint_damping_scale:  [0.5, 1.0, 1.5]
    joint_friction_scale: [0.5, 1.0, 1.5]
    mass_scale:           [0.8, 1.0, 1.2]
    action_delay_steps:   [0, 1, 2]

# ── Stage 3: DR Eureka ──
dr_eureka:
  num_samples: 16
  model: "gemini-2.5-flash-lite"
  dr_template_file: "./templates/dr_template.py"
  dr_output_file: "./outputs/dr_config.py"

# --- Per-Robot Configs ---
robots:
  franka-reach:
    ee_body_name: "panda_hand"
    asset_name: "robot"
    joint_pattern: "panda_joint.*"
    num_joints: 7

  ur10-reach:
    ee_body_name: "ee_link"
    asset_name: "robot"
    joint_pattern: ".*"
    num_joints: 6

  franka-reach-play:
    ee_body_name: "panda_hand"
    joint_pattern: "panda_joint.*"

  ur10-reach-play:
    ee_body_name: "ee_link"
    joint_pattern: ".*"